name: Ultimate Ad Killer (All-in-One)

on:
  workflow_dispatch:
    inputs: 
      apk_url:
        description: 'Paste your MediaFire, GDrive, or Direct URL'
        required: true
        type: string

jobs:
  nuke-ads:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install gdown
        run: pip install gdown

      - name: Download APK from URL
        run: |
          mkdir -p input_apk
          cd input_apk
          
          URL="${{ github.event.inputs.apk_url }}"
          
          if [[ "$URL" == *"drive.google.com"* ]]; then
            echo "Google Drive link detected..."
            gdown "$URL"
            
          elif [[ "$URL" == *"mediafire.com"* ]]; then
            echo "MediaFire link detected. Extracting the true direct link..."
            
            # Method 1: Look for the download button and extract the href, regardless of tag order
            DIRECT_URL=$(curl -sL "$URL" | grep -i 'id="downloadButton"' | grep -oP 'href="\K[^"]+')
            
            # Method 2: If the button is missing, just hunt for any direct .apk link on the page
            if [ -z "$DIRECT_URL" ]; then
              echo "Primary extraction failed. Trying fallback method..."
              DIRECT_URL=$(curl -sL "$URL" | grep -oP 'https?://[^"]+\.apk' | head -n 1)
            fi
            
            if [ -z "$DIRECT_URL" ]; then
              echo "Error: Could not extract the direct link. MediaFire is either blocking GitHub's IP or asking for a Captcha."
              exit 1
            fi
            
            echo "Successfully grabbed direct link: $DIRECT_URL"
            echo "Downloading..."
            wget -q --show-progress -O downloaded_app.apk "$DIRECT_URL"
            
          else
            echo "Downloading from standard link..."
            wget -q --show-progress -O downloaded_app.apk "$URL"
          fi
          
          cd ..

      - name: Download Apktool & Signer
        run: |
          wget https://github.com/iBotPeaches/Apktool/releases/download/v3.0.1/apktool_3.0.1.jar -O apktool.jar
          wget https://github.com/patrickfav/uber-apk-signer/releases/download/v1.3.0/uber-apk-signer-1.3.0.jar -O signer.jar

      - name: Decompile APK
        run: |
          APK_FILE=$(ls input_apk/*.apk | head -n 1)
          echo "Decompiling $APK_FILE..."
          # The -s flag prevents Apktool from touching the source code to avoid Android 13 corruption!
          java -jar apktool.jar d -s -f "$APK_FILE" -o unpacked_apk

      - name: Nuke the Ads Automatically and Patch Android 13 Compatibility
        run: |
          echo "Hunting down the AdMob ID and replacing it with a fake one..."
          # This scans every XML and Smali file to break the connection to the ads
          find unpacked_apk -type f \( -name "*.xml" -o -name "*.smali" \) -exec sed -i 's/ca-app-pub-8008266621541329~2871788802/ca-app-pub-0000000000000000~0000000000/g' {} +
          echo "Ads successfully disabled!"
          
          echo "Applying Android 12+ extractNativeLibs compression fix..."
          # This tells your phone not to panic about compressed files
          sed -i 's/android:extractNativeLibs=\"false\"/android:extractNativeLibs=\"true\"/g' unpacked_apk/AndroidManifest.xml
          sed -i "s/android:extractNativeLibs='false'/android:extractNativeLibs='true'/g" unpacked_apk/AndroidManifest.xml
          echo "Compatibility patched!"

      - name: Rebuild APK
        run: |
          echo "Rebuilding the ad-free APK..."
          # Removed the deprecated flag since v3.0.1 defaults to the modern compiler anyway
          java -jar apktool.jar b unpacked_apk -o new_unsigned_app.apk

      - name: Sign APK (Debug Key)
        run: |
          echo "Signing the APK so Android allows installation..."
          # Added --allowResign just in case old signatures linger
          java -jar signer.jar -a new_unsigned_app.apk --allowResign -o final_apk_dir

      - name: Upload Final Ad-Free APK
        uses: actions/upload-artifact@v4
        with:
          name: Ad-Free-App
          path: final_apk_dir/*.apk
          retention-days: 7
