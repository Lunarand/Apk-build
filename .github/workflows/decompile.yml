name: 1. Decompile APK from URL

on:
  workflow_dispatch:
    inputs: 
      apk_url:
        description: 'Paste the direct download URL or Google Drive link'
        required: true
        type: string

jobs:
  decompile:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install gdown (for Google Drive links)
        run: pip install gdown

      - name: Download APK from URL
        run: |
          # Create the folder dynamically
          mkdir -p input_apk
          cd input_apk
          
          URL="${{ github.event.inputs.apk_url }}"
          
          # Check if it is a Google Drive link
          if [[ "$URL" == *"drive.google.com"* ]]; then
            echo "Google Drive link detected. Downloading via gdown..."
            gdown "$URL"
          else
            echo "Downloading from direct link..."
            # Downloads the file and names it downloaded_app.apk
            wget -O downloaded_app.apk "$URL"
          fi
          
          cd ..

      - name: Download Apktool
        # Updated to grab the latest v3.0.1 from the official GitHub Releases page
        run: wget https://github.com/iBotPeaches/Apktool/releases/download/v3.0.1/apktool_3.0.1.jar -O apktool.jar

      - name: Decompile APK
        run: |
          APK_FILE=$(ls input_apk/*.apk | head -n 1)
          echo "Decompiling $APK_FILE..."
          java -jar apktool.jar d -f "$APK_FILE" -o unpacked_apk

      - name: Zip the Unpacked Files
        run: zip -r unpacked_apk.zip unpacked_apk/

      - name: Upload Zipped Files as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Unpacked-APK-Source
          path: unpacked_apk.zip
          retention-days: 7
